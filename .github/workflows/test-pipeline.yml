name: Automated Tests CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
   
jobs:
  ubuntu-build-and-test:
    runs-on: ubuntu-24.04
    
    defaults:
      run:
        working-directory: ./Test_project/lab-2-project

    steps:
    - uses: actions/checkout@v4
    
    - name: Set up JDK 25
      uses: actions/setup-java@v4
      with:
        java-version: '25'
        distribution: 'temurin'

    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@af1da67850ed9a4cedd57bfd976089dd991e2582 # v4.0.0
      with:
        gradle-version: '9.1.0'

    - name: Setup ALSA Null Output
      run: |
        sudo apt-get update
        sudo apt-get install -y libasound2-plugins
        echo "pcm.!default { type null }" > ~/.asoundrc
        echo "ctl.!default { type null }" >> ~/.asoundrc

    - name: Build with Gradle 9.1.0
      run: gradle build

    - name: Upload Test Report
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: test-results
        path: Test_project/lab-2-project/build/reports/tests/test/
        retention-days: 1
